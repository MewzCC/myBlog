spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  task:
    scheduling:
      enabled: false

app:
  jwt:
    secret: ZW1lcmdlbmN5LWRldmVsb3BtZW50LXNlY3JldC1yZXBsYWNlLW1lLTAxMjM0NTY3ODlhYmNkZWY=
    expiration-hours: 72
  storage:
    upload-dir: target/test-uploads
    public-prefix: /uploads/
