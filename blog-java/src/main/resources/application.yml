server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: blog-java
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/blog_java?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:zcc520}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:ZW1lcmdlbmN5LWRldmVsb3BtZW50LXNlY3JldC1yZXBsYWNlLW1lLTAxMjM0NTY3ODlhYmNkZWY=}
    expiration-hours: ${JWT_EXPIRATION_HOURS:72}
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}
    public-prefix: /uploads/
  mail:
    from: ${MAIL_FROM:no-reply@example.com}
  admin:
    email: ${DEFAULT_ADMIN_EMAIL:admin@example.com}
    password: ${DEFAULT_ADMIN_PASSWORD:admin123}
