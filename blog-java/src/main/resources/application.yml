server:
  port: ${SERVER_PORT}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:.env.example[.properties]
  application:
    name: blog-java
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      repositories:
        enabled: false
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-hours: ${JWT_EXPIRATION_HOURS}
  storage:
    upload-dir: ${UPLOAD_DIR}
    public-prefix: /uploads/
  mail:
    from: ${MAIL_FROM}
    dev-mock-enabled: ${MAIL_DEV_MOCK_ENABLED}
  admin:
    email: ${DEFAULT_ADMIN_EMAIL}
    password: ${DEFAULT_ADMIN_PASSWORD}
